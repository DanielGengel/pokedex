<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="main.css" />
        <link rel="shortcut icon" href="./assets/icons/pokemon-favicon.png" type="image/x-icon" />
        <script src="main.js" type="module"></script>
        <title>Pokedex</title>
    </head>
    <body>
        <header class="mainHeader">
            <div class="headerContent">
                <img src="./assets/icons/pokemon-icon.svg" alt="Pokemon Header Icon" />
                <input type="text" name="searchField" id="searchFieldID" data-id="search-input" placeholder="Find Pokémon..." minlength="3" pattern="[A-Za-z]{3,}" required="" title="sfdsdfsdf">
            </div>
        </header>

        <main class="content" data-id="content">
            <div class="hero-background"></div>
            <div class="pokedexGrid" id="pokedexGridID"></div>

            <div id="loader" class="loader hidden">Loading...</div>
            <button class="btnLoadMore" id="btnLoadMoreID" data-id="load-more-button">Load More</button>
            <div id="overlayContainer"></div>
            <div id="pokemon-modal"></div>
        </main>
        <footer class="mainFooter">©️ Daniel Gengel</footer>
    </body>
</html>
